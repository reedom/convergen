name: kiro:spec
description: >
  Execute SDD actions (create/add/update/refine/analyze) with strict file separation.
  See .claude/docs/guidelines/SDD.md for rules and examples. analyze uses a subagent
  to offload heavy scanning and returns a compact summary to the primary session.

usage: |
  /kiro:spec <action> [sdd_file] [-d dir | -spec dir] [-t path | -target path] [memo...]
  action   := create | add | update | refine | analyze
  sdd_file := req | design | tasks   # optional; if omitted, action decides scope
  examples:
    /kiro:spec create -target ./service-a "Greenfield API gateway"
    /kiro:spec add tasks -target ./shop "Build rating stats; refs=4.1, REQ-4.3"
    /kiro:spec analyze -d .claude/docs/spec

inputs:
  - name: action
    required: true
  - name: sdd_file
    required: false
  - name: memo
    required: false
    variadic: true
  - name: flags
    required: false
    variadic: true

options:
  # SDD documents live here by default (single directory policy)
  sdd_root: ".claude/docs/spec"
  guideline_path: "file://.claude/docs/guidelines/SDD.md"
  require_dod: false                 # toggle with --require-dod
  # subagent settings for analyze
  analyze_via_subagent: true
  analyze_recent_days: 30
  analyze_max_findings: 10           # per section; primary receives summary only
  analyze_return_format: "json"      # json | markdown
  store_last_analysis_summary: true  # keep short summary in primary context

templates:
  requirements_md: "file://.claude/docs/spec/templates/requirements.md"
  design_md:       "file://.claude/docs/spec/templates/design.md"
  tasks_md:        "file://.claude/docs/spec/templates/tasks.md"

policies:
  id_generation:
    task:
      format: "TASK-%03d"
      start_from: 1
      reuse_deleted: false
      section_for_retired: "Retired"
    requirement:
      format: "REQ-%d.%d"            # authors manage numbering
  diff_application:
    strategy: "line-scoped"          # only touch matched lines / move task blocks

validators:
  - name: forbid_requirement_verbs_in_tasks_and_design
    pattern: '(?i)\\b(shall|must|should)\\b'
    disallowed_in: ['design.md','tasks.md']

  - name: forbid_codey_details_in_requirements
    pattern: '(?i)\\b(class|module|endpoint|table|index|algorithm|api|grpc|kafka|s3|lambda)\\b'
    disallowed_in: ['requirements.md']

  - name: forbid_task_checkboxes_in_design
    pattern: '^(\\s*-)\\s*\\[( |x)\\]'
    disallowed_in: ['design.md']

  - name: tasks_checkbox_only
    pattern: '^(\\s*-)\\s*\\[( |x)\\]'
    allowed_in: ['tasks.md']

  - name: tasks_require_refs
    pattern: '(?i)^\\s*-\\s*\\[( |x)\\]\\s*TASK-\\d{3}.*\\brefs:\\s*(REQ-[0-9]+(?:\\.[0-9]+)?(?:\\s*,\\s*REQ-[0-9]+(?:\\.[0-9]+)?)*)(?:\\s*·|$)'
    allowed_in: ['tasks.md']

  - name: tasks_require_dod
    pattern: '(?i)^\\s*-\\s*\\[( |x)\\]\\s*TASK-\\d{3}.*\\bDoD:\\s*\\S'
    allowed_in: ['tasks.md']
    enabled_when_option: 'require_dod'

  - name: unique_task_ids
    pattern: 'TASK-(\\d{3})'
    allowed_in: ['tasks.md']
    check: 'no-duplicate-captures'

on_execute:
  - step: parse_flags
    prompt: |
      # Flags:
      # - --require-dod                 -> options.require_dod=true
      # - -d <dir> | -spec <dir>        -> overrides options.sdd_root
      # - -t <path> | -target <path>    -> context.target_path (dir or .md file)
      If '--require-dod' present, set options.require_dod=true.
      If '-spec' or '-d' provided, set options.sdd_root accordingly.
      If '-target' or '-t' provided, set context.target_path accordingly.

  - step: resolve_paths
    prompt: |
      # Determine SDD file paths from options.sdd_root (single SDD directory policy)
      sdd_root = options.sdd_root (default ".claude/docs/spec")
      sdd_files:
        requirements = join(sdd_root, "requirements.md")
        design       = join(sdd_root, "design.md")
        tasks        = join(sdd_root, "tasks.md")

      # Interpret sdd_file (req|design|tasks) if provided.
      # Interpret target_path:
      #   - If it ends with requirements.md/design.md/tasks.md, treat as sdd_file override.
      #   - If it is a directory, use it to bias scan_sources (code focus) and suggested actions.
      # Ensure sdd_root exists for create/add; for update/refine/analyze if missing -> "SDD not found".

  - step: ensure_templates
    when: action in ['create','add']
    prompt: |
      # Create missing SDD files by loading external templates (file://).
      # Keep command lightweight by not embedding templates.
      If any of the three SDD files are missing under sdd_root, load from templates and write them.

  - step: scan_sources
    prompt: |
      # Summarize codebase & current SDD in <=300 tokens.
      # If context.target_path is a directory, prioritize scanning that subtree.
      Collect:
        - main modules/APIs/data models
        - recent changes (mtime within ~{{options.analyze_recent_days}} days)
        - presence/absence of SDD files

  - step: route_action
    prompt: |
      # Central routing (sdd_file guides scope; can be null):
      - create:
          If any SDD file or code exists: bootstrap SDD from code + memo.
          If neither and no memo: ask 5 concise questions, then draft all three docs.
      - add:
          If SDD missing: fallback to create.
          Else if memo missing: ask for delta (<=5 lines).
          Else: apply to the selected file (req/design/tasks) or classify automatically.
      - update:
          If SDD missing: print "SDD not found" and stop.
          Else: reflect recent code/memo; otherwise reconcile drift from current code.
      - refine:
          If SDD missing: print "SDD not found" and stop.
          Else: tighten/clarify docs without scope change.
      - analyze:
          Read-only: compare SDD vs code and report gaps & violations; no writes.

  - step: parse_memo
    when: action in ['add','update'] and (sdd_file in ['tasks'] or (sdd_file is null and intent looks like tasks)) and memo is not empty
    prompt: |
      # Loose free-form parser -> {title, refs[], dod?, subs[]}
      Accept prose, bullets, or semi-structured hints (refs/DoD/subs).
      Extract REQ IDs anywhere; normalize (prepend REQ-, uppercase, dedupe, sort).
      If refs empty -> ask user for REQ IDs unless policy forbids proceeding.

  - step: allocate_ids
    when: action in ['add'] and (sdd_file == 'tasks' or (sdd_file is null and inferred == 'tasks'))
    prompt: |
      # Issue smallest unused TASK number >= start_from by scanning tasks.md for TASK-(\\d{3}).
      # Honor policies.id_generation.task.* (no reuse; Retired kept).

  - step: enforce_separation
    prompt: |
      # Apply file guardrails (validators) conceptually BEFORE writing:
      # - No "shall/must/should" outside requirements.md
      # - No checkbox lists in design.md
      # - tasks.md lines need refs (and DoD if option enabled)
      # Reject or auto-correct placement; do not duplicate content across files.

  - step: apply_diff_minimally
    when: action in ['add','update','refine'] and (sdd_file is not null)
    prompt: |
      # Minimal diffs only:
      # For tasks.md: match single task line
      #   ^\\s*-\\s*\\[( |x)\\]\\s*(TASK-\\d{3})\\s+(?<title>.*?)\\s+·\\s+refs:\\s+(?<refs>[^·\\n]+)(?:\\s+·\\s+DoD:\\s+(?<dod>.*))?$
      # - ADD: append to Backlog; add indented "- [ ]" subtasks if provided
      # - UPDATE: replace matched fields; move block when section change requested
      # - REMOVE: never delete; move to "## Retired" with "(retired) " prefix
      # For requirements.md / design.md: change only the targeted sections/lines.

  # ==== Subagent-backed analyze ====
  - step: run_analysis_subagent
    when: action == 'analyze' and options.analyze_via_subagent == true
    prompt: |
      # Spawn a subagent to analyze SDD vs code (read-only).
      # Inputs to subagent:
      #   sdd_root, target_path (optional), analyze_recent_days
      #   guideline_path (for guardrail checks)
      # Required subagent output ({{options.analyze_return_format}}):
      # {
      #   "summary": ["<bullet 1>", "..."],                   # 3-6 bullets
      #   "findings": {
      #     "requirements": ["...", "..."][:{{options.analyze_max_findings}}],
      #     "design": ["...", "..."][:{{options.analyze_max_findings}}],
      #     "tasks": ["...", "..."][:{{options.analyze_max_findings}}]
      #   },
      #   "suggestions": ["/kiro:spec update tasks ...", "..."]  # actionable next steps
      # }
      # Subagent must not modify files; it only reads and summarizes.

  - step: store_analysis_summary
    when: action == 'analyze' and options.analyze_via_subagent == true and options.store_last_analysis_summary == true
    prompt: |
      # Persist only the compact summary in the primary session's short-term slot
      # (e.g., context.last_analysis_summary) to conserve context window.
      # Do not retain full SDD or full code listings.

  - step: run_analysis_inline
    when: action == 'analyze' and options.analyze_via_subagent != true
    prompt: |
      # Fallback: perform the same analysis inline (no subagent). Respect the same limits.

  - step: output
    when: action == 'analyze'
    prompt: |
      # Emit Markdown report only:
      ## Summary
      - {{summary bullets}}
      ## Findings
      ### Requirements
      - {{up to analyze_max_findings}}
      ### Design
      - {{up to analyze_max_findings}}
      ### Tasks
      - {{up to analyze_max_findings}}
      ## Suggested Actions
      - {{top 3-5 actionable /kiro:spec commands}}

  - step: output
    when: action != 'analyze'
    prompt: |
      # Emit compact result:
      - Modified files list
      - One-line rationale per file
      - Suggested next command
