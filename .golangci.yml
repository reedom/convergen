# Comprehensive golangci-lint configuration for convergen
# Updated for golangci-lint v1.64.8 with Go 1.24.5 support
# 
# IMPORTANT: This tool is used as a Go generator via go:generate.
# When users run "//go:generate go run github.com/reedom/convergen",
# the tool is compiled with the USER'S Go version, not this project's go.mod version.
# Therefore, compatibility must be maintained with older Go versions.
#
# See https://golangci-lint.run/usage/configuration/ for all options

run:
  # Timeout for analysis
  timeout: 10m

  # Exit code when at least one issue was found
  issues-exit-code: 1

  # Include test files in analysis
  tests: true

  # Go version - set to minimum supported for backward compatibility
  # This tool may be compiled with older Go versions via go:generate
  go: "1.21"
# Output configuration
output:
  # Format: colored-line-number|line-number|json|tab|checkstyle|code-climate|junit-xml|github-actions
  formats:
    - format: colored-line-number
  # Print lines of code with issue
  print-issued-lines: true
  # Print linter name in the end of issue text
  print-linter-name: true
  # Sort results by: filepath, line and column
  sort-results: true

# Linters configuration
linters:
  # Disable all linters as default is too restrictive
  disable-all: true

  # Enable comprehensive set of linters for golangci-lint v1.64.8
  enable:
    # Core Go linters (always recommended)
    - errcheck       # Check for unchecked errors
    - gosimple       # Suggest code simplifications
    - govet          # Go vet tool
    - ineffassign    # Detect ineffectual assignments
    - staticcheck    # Staticcheck (SA class of checks)
    - typecheck      # Type checking
    - unused         # Detect unused constants, variables, functions

    # Code formatting and style
    # gofmt disabled - conflicts with goimports alignment preferences in Makefile
    # - gofmt          # Check if code is gofmt-ed
    - goimports      # Check if imports are sorted and grouped correctly
    - revive         # Fast, configurable, extensible, flexible linter
    - stylecheck     # Stylecheck (ST class of checks)

    # Code quality and complexity
    - gocyclo        # Cyclomatic complexity
    - gocognit       # Cognitive complexity
    - funlen         # Function length
    - nestif         # Nested if depth
    - cyclop         # Package cyclomatic complexity

    # Performance and optimization
    - prealloc       # Find slice declarations with non-zero initial length
    - unconvert      # Remove unnecessary type conversions
    - unparam        # Reports unused function parameters

    # Security
    - gosec          # Security issues

    # Bugs and error-prone patterns
    - bodyclose      # Check if HTTP response body is closed successfully
    - rowserrcheck   # Check if Err of rows is checked successfully
    - sqlclosecheck  # Check if sql.Rows and sql.Stmt are closed
    # copyloopvar disabled - tool must maintain compatibility with Go <1.22 for go:generate usage
    # - copyloopvar    # Check for pointers to enclosing loop variables (requires Go 1.22+)

    # Code consistency
    - goconst        # Find repeated strings that could be replaced by a constant
    - misspell       # Find misspelled English words
    - godot          # Check if comments end in a period
    - nolintlint     # Reports ill-formed or insufficient nolint directives

    # Import and dependency management
    - gomodguard     # Allow and block list linter for direct Go module dependencies
    - depguard       # Check if package imports are in a list of acceptable packages

    # Additional quality checks
    - dupl           # Code clone detection
    - gochecknoinits # Check that no init functions are present
    - err113         # Check the errors handling expressions (renamed from goerr113)
    - wrapcheck      # Check that errors returned from external packages are wrapped

    # Context and concurrency
    - contextcheck   # Check whether the function uses a non-inherited context
    - noctx          # Find sending http request without context.Context

    # Whitespace and formatting
    - whitespace     # Check for unnecessary whitespace
    - wsl            # Forces you to use empty lines

# Linter-specific settings
linters-settings:
  # Cyclomatic complexity threshold
  gocyclo:
    min-complexity: 20

  # Cognitive complexity threshold
  gocognit:
    min-complexity: 25

  # Function length limits
  funlen:
    lines: 100
    statements: 60

  # Nested if depth
  nestif:
    min-complexity: 5

  # Magic numbers (mnd replaces gomnd in golangci-lint v1.55+, fallback to gomnd for older versions)
  mnd:
    checks:
      - argument
      - case
      - condition
      - operation
      - return
      - assign
    ignored-numbers: [0, 1, 2, 3, 4, 5, 8, 10, 16, 32, 64, 100, 200, 500, 1000, 1024]
    ignored-functions:
      - 'make'
      - 'time.Duration'
      - 'context.WithTimeout'
      - 'context.WithDeadline'
      - 'time.NewTicker'
      - 'time.After'

  # Constants detection
  goconst:
    min-len: 3
    min-occurrences: 3
    ignore-tests: true

  # Duplicate code detection
  dupl:
    threshold: 150

  # Error wrapping
  wrapcheck:
    ignoreSigs:
      - .Errorf(
      - errors.New(
      - errors.Unwrap(
      - .Wrap(
      - .Wrapf(
    ignoreSigRegexps:
      - \.New.*Error\(

  # Security settings
  gosec:
    severity: medium
    confidence: medium
    excludes:
      - G104 # Audit errors not checked (we handle this with errcheck)

  # Import formatting
  goimports:
    local-prefixes: github.com/reedom/convergen

  # Revive configuration (replaces golint)
  revive:
    confidence: 0.8
    rules:
      - name: var-naming
      - name: package-comments
      - name: range-val-in-closure
      - name: var-declaration
      - name: unexported-return
      - name: errorf
      - name: blank-imports
      - name: context-as-argument
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: if-return
      - name: increment-decrement
      - name: indent-error-flow
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-naming

# Issues configuration
issues:
  # Exclude directories
  exclude-dirs:
    - vendor
    - .reference-projects
    - build

  # Exclude files
  exclude-files:
    - ".*\\.pb\\.go$"
    - ".*_generated\\.go$"
    - ".*\\.gen\\.go$"

  # Make issues output unique by line
  uniq-by-line: true

  # Exclude some linters from running on tests files
  exclude-rules:
    # Exclude some linters from running on tests files
    - path: _test\.go
      linters:
        - mnd
        - goconst
        - funlen
        - dupl
        - gocyclo
        - gocognit
        - wrapcheck
        - err113

    # Exclude magic number checks for tests
    - path: _test\.go
      text: "Magic number"
      linters:
        - mnd

    # Allow complex functions in parser package (they handle complex logic)
    - path: pkg/parser/
      linters:
        - gocyclo
        - gocognit
        - funlen
      text: "(ParseSourceFile|processMethod|ResolveType|unified_interface|error_recovery)"

    # Allow longer functions for strategy pattern implementations
    - path: pkg/parser/unified_interface\.go
      linters:
        - funlen
        - gocyclo

    # Allow complex error handling functions
    - path: pkg/parser/error_
      linters:
        - gocyclo
        - gocognit
        - funlen

    # Exclude function length checks for tests
    - path: _test\.go
      text: "Function 'Test"
      linters:
        - funlen

    # Allow long test functions
    - path: _test\.go
      text: "cognitive complexity"
      linters:
        - gocognit

    # Exclude some issues in test files
    - path: _test\.go
      linters:
        - testpackage
      text: "should be in a package"

    # Exclude error wrapping requirements for test files
    - path: _test\.go
      linters:
        - wrapcheck

    # Allow magic numbers in time operations (both mnd and gomnd for compatibility)
    - text: "Magic number: (1000|60|24|30|365), in <operation> detected"
      linters:
        - mnd
        - gomnd

    # Exclude specific issues for main.go
    - path: main\.go
      linters:
        - gocritic
      text: "exitAfterDefer"

    # Disable depguard for internal packages - it's overly restrictive for internal development
    - linters:
        - depguard
      text: "is not allowed from list"

  # Maximum issues count per linter. Set to 0 to disable
  max-issues-per-linter: 0

  # Maximum count of issues with the same text. Set to 0 to disable
  max-same-issues: 0

  # Show only new issues created after git revision
  # new-from-rev: HEAD~1

  # Independently of option `exclude` we use default exclude patterns,
  # it can be disabled by this option. To list all excluded by default
  # patterns execute `golangci-lint run --help`.
  exclude-use-default: false

  # If set to true exclude and exclude-rules regular expressions become case-sensitive
  exclude-case-sensitive: false

  # Fix found issues (if it's supported by the linter)
  fix: false
